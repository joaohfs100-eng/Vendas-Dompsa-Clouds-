<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080c14">
    <meta name="description" content="Vendas Dompsa - Gerenciador de vendas offline-first">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vendas Dompsa">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23080c14' width='192' height='192'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='%23a78bfa' text-anchor='middle' dominant-baseline='middle'>VD</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23080c14' width='192' height='192'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='%23a78bfa' text-anchor='middle' dominant-baseline='middle'>VD</text></svg>">
    <title>Vendas Dompsa - Cloud Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: oklch(0.65 0.2 259.815);
            --primary-foreground: oklch(0.985 0 0);
            --background: oklch(0.08 0.01 240);
            --foreground: oklch(0.95 0.01 240);
            --card: oklch(0.12 0.02 240);
            --card-foreground: oklch(0.95 0.01 240);
            --muted: oklch(0.25 0.02 240);
            --muted-foreground: oklch(0.7 0.01 240);
            --border: oklch(0.2 0.02 240);
            --input: oklch(0.15 0.02 240);
            --accent: oklch(0.65 0.2 259.815);
            --destructive: oklch(0.577 0.245 27.325);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--background);
            color: var(--foreground);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }

        .min-h-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--border);
            background: var(--card);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: bold;
        }

        header p {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--foreground);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--input);
            border-color: var(--accent);
        }

        button.primary {
            background: var(--primary);
            color: var(--primary-foreground);
            border-color: var(--primary);
        }

        button.primary:hover {
            opacity: 0.9;
        }

        button.destructive {
            background: var(--destructive);
            color: white;
            border-color: var(--destructive);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input, select, textarea {
            padding: 0.5rem;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--foreground);
            border-radius: 0.5rem;
            font-size: 1rem;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .card-header {
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .card-description {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        .grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .grid-cols-1 { grid-template-columns: 1fr; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }

        @media (max-width: 768px) {
            .grid-cols-2 { grid-template-columns: 1fr; }
            .grid-cols-3 { grid-template-columns: 1fr; }
            .grid-cols-4 { grid-template-columns: 1fr; }
        }

        .flex {
            display: flex;
            gap: 0.5rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flex-col {
            flex-direction: column;
        }

        .w-full { width: 100%; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .p-4 { padding: 1rem; }

        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        .text-muted { color: var(--muted-foreground); }

        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.5rem;
            max-width: 300px;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
            overflow-x: auto;
        }

        .tab {
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            color: var(--muted-foreground);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .sync-indicator {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 999;
        }

        .sync-indicator.online::before {
            content: '●';
            color: #22c55e;
        }

        .sync-indicator.offline::before {
            content: '●';
            color: #ef4444;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--foreground);
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.5rem;
        }

        .icon-btn:hover {
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--muted-foreground);
        }

        .metric-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            margin: 0.5rem 0;
        }

        .metric-label {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ============================================
        // STORAGE MANAGER
        // ============================================
        const storage = {
            get(key) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : null;
                } catch (e) {
                    console.error('Storage get error:', e);
                    return null;
                }
            },
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error('Storage set error:', e);
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(key);
                } catch (e) {
                    console.error('Storage remove error:', e);
                }
            },
            clear() {
                try {
                    localStorage.clear();
                } catch (e) {
                    console.error('Storage clear error:', e);
                }
            }
        };

        // ============================================
        // APP STATE
        // ============================================
        const state = {
            currentPage: 'dashboard',
            selectedAccountId: null,
            user: { id: 1, name: 'Usuário', email: 'user@example.com' },
            accounts: [],
            clients: [],
            products: [],
            sales: [],
            isOnline: navigator.onLine,
            isSyncing: false,
            toasts: [],
        };

        // Initialize data from storage
        function initializeData() {
            const savedAccounts = storage.get('accounts') || [
                { id: 1, name: 'Dompsa', ownerId: 1, createdAt: new Date() }
            ];
            const savedClients = storage.get('clients') || [];
            const savedProducts = storage.get('products') || [];
            const savedSales = storage.get('sales') || [];

            state.accounts = savedAccounts;
            state.clients = savedClients;
            state.products = savedProducts;
            state.sales = savedSales;
            state.selectedAccountId = state.accounts[0]?.id || 1;

            storage.set('accounts', state.accounts);
            storage.set('clients', state.clients);
            storage.set('products', state.products);
            storage.set('sales', state.sales);
        }

        // ============================================
        // TOAST NOTIFICATIONS
        // ============================================
        function showToast(message, type = 'info') {
            const id = Date.now();
            const toast = { id, message, type };
            state.toasts.push(toast);
            render();
            setTimeout(() => {
                state.toasts = state.toasts.filter(t => t.id !== id);
                render();
            }, 3000);
        }

        // ============================================
        // DATA OPERATIONS
        // ============================================
        function addClient(name, cia, whatsapp) {
            if (!name.trim()) {
                showToast('Nome do cliente é obrigatório', 'error');
                return;
            }

            const client = {
                id: Date.now(),
                accountId: state.selectedAccountId,
                name,
                cia: cia || 'Outros',
                whatsapp: whatsapp || '',
                createdAt: new Date()
            };

            state.clients.push(client);
            storage.set('clients', state.clients);
            showToast('Cliente adicionado com sucesso', 'success');
            render();
        }

        function deleteClient(clientId) {
            if (!confirm('Tem certeza que deseja remover este cliente?')) return;
            state.clients = state.clients.filter(c => c.id !== clientId);
            storage.set('clients', state.clients);
            showToast('Cliente removido com sucesso', 'success');
            render();
        }

        function addProduct(name, price, stock) {
            if (!name.trim() || !price.trim()) {
                showToast('Nome e preço são obrigatórios', 'error');
                return;
            }

            const product = {
                id: Date.now(),
                accountId: state.selectedAccountId,
                name,
                price,
                stockDaily: parseInt(stock) || 0,
                createdAt: new Date()
            };

            state.products.push(product);
            storage.set('products', state.products);
            showToast('Produto adicionado com sucesso', 'success');
            render();
        }

        function deleteProduct(productId) {
            if (!confirm('Tem certeza que deseja remover este produto?')) return;
            state.products = state.products.filter(p => p.id !== productId);
            storage.set('products', state.products);
            showToast('Produto removido com sucesso', 'success');
            render();
        }

        function addSale(clientId, productId, quantity, price, notes) {
            if (!clientId || !productId || !price.trim()) {
                showToast('Preencha todos os campos obrigatórios', 'error');
                return;
            }

            const sale = {
                id: Date.now(),
                accountId: state.selectedAccountId,
                clientId,
                productId,
                quantity: parseInt(quantity) || 1,
                price,
                status: 'pendente',
                notes: notes || '',
                saleDate: new Date(),
                createdAt: new Date()
            };

            state.sales.push(sale);
            storage.set('sales', state.sales);
            showToast('Venda registrada com sucesso', 'success');
            render();
        }

        function toggleSaleStatus(saleId) {
            const sale = state.sales.find(s => s.id === saleId);
            if (sale) {
                sale.status = sale.status === 'pendente' ? 'pago' : 'pendente';
                storage.set('sales', state.sales);
                showToast('Status da venda atualizado', 'success');
                render();
            }
        }

        function deleteSale(saleId) {
            if (!confirm('Tem certeza que deseja remover esta venda?')) return;
            state.sales = state.sales.filter(s => s.id !== saleId);
            storage.set('sales', state.sales);
            showToast('Venda removida com sucesso', 'success');
            render();
        }

        // ============================================
        // FILTERING
        // ============================================
        function getAccountClients() {
            return state.clients.filter(c => c.accountId === state.selectedAccountId);
        }

        function getAccountProducts() {
            return state.products.filter(p => p.accountId === state.selectedAccountId);
        }

        function getAccountSales() {
            return state.sales.filter(s => s.accountId === state.selectedAccountId);
        }

        // ============================================
        // PAGE RENDERING
        // ============================================
        function renderDashboard() {
            const clients = getAccountClients();
            const products = getAccountProducts();
            const sales = getAccountSales();
            const pendingSales = sales.filter(s => s.status === 'pendente');
            const paidSales = sales.filter(s => s.status === 'pago');
            const pendingRevenue = pendingSales.reduce((sum, s) => sum + parseFloat(s.price || 0), 0);
            const paidRevenue = paidSales.reduce((sum, s) => sum + parseFloat(s.price || 0), 0);

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Dashboard</div>
                    </div>
                    <div class="grid grid-cols-4">
                        <div class="metric-card">
                            <div class="metric-label">Clientes</div>
                            <div class="metric-value">${clients.length}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Produtos</div>
                            <div class="metric-value">${products.length}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Vendas Pendentes</div>
                            <div class="metric-value">${pendingSales.length}</div>
                            <div class="text-sm text-muted">R$ ${pendingRevenue.toFixed(2)}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Vendas Pagas</div>
                            <div class="metric-value">${paidSales.length}</div>
                            <div class="text-sm text-muted">R$ ${paidRevenue.toFixed(2)}</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3">
                    <div class="card" onclick="state.currentPage = 'clients'; render();" style="cursor: pointer;">
                        <div class="card-header">
                            <div class="card-title">Clientes</div>
                            <div class="card-description">Gerenciar clientes</div>
                        </div>
                        <button class="primary w-full">Acessar</button>
                    </div>

                    <div class="card" onclick="state.currentPage = 'products'; render();" style="cursor: pointer;">
                        <div class="card-header">
                            <div class="card-title">Produtos</div>
                            <div class="card-description">Gerenciar produtos</div>
                        </div>
                        <button class="primary w-full">Acessar</button>
                    </div>

                    <div class="card" onclick="state.currentPage = 'sales'; render();" style="cursor: pointer;">
                        <div class="card-header">
                            <div class="card-title">Vendas</div>
                            <div class="card-description">Gerenciar vendas</div>
                        </div>
                        <button class="primary w-full">Acessar</button>
                    </div>
                </div>
            `;
        }

        function renderClients() {
            const clients = getAccountClients();

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Novo Cliente</div>
                        <div class="card-description">Adicione um novo cliente à sua conta</div>
                    </div>
                    <div class="grid grid-cols-4">
                        <input type="text" id="clientName" placeholder="Nome do cliente">
                        <input type="text" id="clientCia" placeholder="CIA (ex: Dompsa)" value="Outros">
                        <input type="text" id="clientWhatsapp" placeholder="WhatsApp (opcional)">
                        <button class="primary" onclick="addClient(document.getElementById('clientName').value, document.getElementById('clientCia').value, document.getElementById('clientWhatsapp').value); document.getElementById('clientName').value = ''; document.getElementById('clientCia').value = 'Outros'; document.getElementById('clientWhatsapp').value = '';">Adicionar</button>
                    </div>
                </div>

                <div class="grid grid-cols-1">
                    ${clients.length > 0 ? clients.map(client => `
                        <div class="card">
                            <div class="flex-between">
                                <div>
                                    <div style="font-weight: 600;">${client.name}</div>
                                    <div class="text-sm text-muted">CIA: ${client.cia}</div>
                                    ${client.whatsapp ? `<div class="text-sm text-muted">WhatsApp: ${client.whatsapp}</div>` : ''}
                                </div>
                                <button class="destructive" onclick="deleteClient(${client.id})">Remover</button>
                            </div>
                        </div>
                    `).join('') : `<div class="empty-state">Nenhum cliente cadastrado ainda</div>`}
                </div>
            `;
        }

        function renderProducts() {
            const products = getAccountProducts();

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Novo Produto</div>
                        <div class="card-description">Adicione um novo produto à sua conta</div>
                    </div>
                    <div class="grid grid-cols-5">
                        <input type="text" id="productName" placeholder="Nome do produto">
                        <input type="number" id="productPrice" placeholder="Preço (R$)" step="0.01">
                        <input type="number" id="productStock" placeholder="Estoque diário" value="0">
                        <button class="primary" style="grid-column: span 2;" onclick="addProduct(document.getElementById('productName').value, document.getElementById('productPrice').value, document.getElementById('productStock').value); document.getElementById('productName').value = ''; document.getElementById('productPrice').value = ''; document.getElementById('productStock').value = '0';">Adicionar Produto</button>
                    </div>
                </div>

                <div class="grid grid-cols-3">
                    ${products.length > 0 ? products.map(product => `
                        <div class="card">
                            <div style="font-weight: 600; margin-bottom: 0.5rem;">${product.name}</div>
                            <div class="text-sm text-muted">Preço: R$ ${parseFloat(product.price).toFixed(2)}</div>
                            <div class="text-sm text-muted">Estoque: ${product.stockDaily} unidades</div>
                            <div class="flex mt-4">
                                <button class="destructive w-full" onclick="deleteProduct(${product.id})">Remover</button>
                            </div>
                        </div>
                    `).join('') : `<div class="empty-state" style="grid-column: span 3;">Nenhum produto cadastrado ainda</div>`}
                </div>
            `;
        }

        function renderSales() {
            const sales = getAccountSales();
            const clients = getAccountClients();
            const products = getAccountProducts();

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Nova Venda</div>
                        <div class="card-description">Registre uma nova venda</div>
                    </div>
                    <div class="grid grid-cols-6">
                        <select id="saleClientId">
                            <option value="">Selecione cliente</option>
                            ${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                        <select id="saleProductId">
                            <option value="">Selecione produto</option>
                            ${products.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                        </select>
                        <input type="number" id="saleQuantity" placeholder="Quantidade" value="1">
                        <input type="number" id="salePrice" placeholder="Preço (R$)" step="0.01">
                        <input type="text" id="saleNotes" placeholder="Observações (opcional)">
                        <button class="primary" onclick="addSale(parseInt(document.getElementById('saleClientId').value), parseInt(document.getElementById('saleProductId').value), document.getElementById('saleQuantity').value, document.getElementById('salePrice').value, document.getElementById('saleNotes').value); document.getElementById('saleClientId').value = ''; document.getElementById('saleProductId').value = ''; document.getElementById('saleQuantity').value = '1'; document.getElementById('salePrice').value = ''; document.getElementById('saleNotes').value = '';">Registrar</button>
                    </div>
                </div>

                <div class="grid grid-cols-1">
                    ${sales.length > 0 ? sales.map(sale => {
                        const client = clients.find(c => c.id === sale.clientId);
                        const product = products.find(p => p.id === sale.productId);
                        const isPaid = sale.status === 'pago';
                        return `
                            <div class="card">
                                <div class="flex-between">
                                    <div>
                                        <div style="font-weight: 600; margin-bottom: 0.5rem;">
                                            ${client?.name || 'Cliente desconhecido'}
                                            <span style="color: ${isPaid ? '#22c55e' : '#eab308'}; margin-left: 0.5rem;">●</span>
                                        </div>
                                        <div class="text-sm text-muted">Produto: ${product?.name || 'Produto desconhecido'}</div>
                                        <div class="text-sm text-muted">Quantidade: ${sale.quantity} | Preço: R$ ${parseFloat(sale.price).toFixed(2)}</div>
                                        ${sale.notes ? `<div class="text-sm text-muted">Notas: ${sale.notes}</div>` : ''}
                                    </div>
                                    <div class="flex flex-col">
                                        <button onclick="toggleSaleStatus(${sale.id})" style="margin-bottom: 0.5rem;">${isPaid ? 'Pago' : 'Pendente'}</button>
                                        <button class="destructive" onclick="deleteSale(${sale.id})">Remover</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('') : `<div class="empty-state">Nenhuma venda registrada ainda</div>`}
                </div>
            `;
        }

        // ============================================
        // MAIN RENDER FUNCTION
        // ============================================
        function render() {
            const root = document.getElementById('root');

            let pageContent = '';
            switch (state.currentPage) {
                case 'dashboard':
                    pageContent = renderDashboard();
                    break;
                case 'clients':
                    pageContent = renderClients();
                    break;
                case 'products':
                    pageContent = renderProducts();
                    break;
                case 'sales':
                    pageContent = renderSales();
                    break;
            }

            root.innerHTML = `
                <div class="min-h-screen">
                    <header>
                        <div>
                            <h1>Vendas Dompsa</h1>
                            <p>Bem-vindo, ${state.user.name}</p>
                        </div>
                        <button onclick="logout()">Sair</button>
                    </header>

                    <div style="border-bottom: 1px solid var(--border); background: var(--card); padding: 0.75rem;">
                        <div class="container">
                            <div class="flex" style="gap: 0.5rem; flex-wrap: wrap;">
                                ${state.accounts.map(acc => `
                                    <button 
                                        class="${state.selectedAccountId === acc.id ? 'primary' : ''}"
                                        onclick="state.selectedAccountId = ${acc.id}; render();"
                                    >
                                        ${acc.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <main class="main-content">
                        <div class="container">
                            ${pageContent}
                        </div>
                    </main>

                    <div class="sync-indicator ${state.isOnline ? 'online' : 'offline'}">
                        ${state.isOnline ? 'Online' : 'Offline'}
                    </div>

                    ${state.toasts.map(toast => `
                        <div class="toast" style="background: ${toast.type === 'error' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(34, 197, 94, 0.1)'}; border-color: ${toast.type === 'error' ? '#ef4444' : '#22c55e'};">
                            ${toast.message}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        window.addEventListener('online', () => {
            state.isOnline = true;
            showToast('Conectado à internet', 'success');
            render();
        });

        window.addEventListener('offline', () => {
            state.isOnline = false;
            showToast('Sem conexão com a internet', 'error');
            render();
        });

        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                state.currentPage = 'login';
                render();
            }
        }

        // ============================================
        // SERVICE WORKER REGISTRATION
        // ============================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.log('Erro ao registrar Service Worker:', err));
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        initializeData();
        render();
    </script>
</body>
</html>
